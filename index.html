<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>บิลเสียง</title>
<meta name="theme-color" content="#1a3a6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="บิลเสียง">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Noto+Serif+Thai:wght@700;900&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ─── Reset ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;height:100dvh;overflow:hidden}
body{font-family:'Sarabun',sans-serif;background:#f5f0e8;color:#1a1410;transition:background .2s,color .2s}
body[data-dark="1"]{background:#111010;color:#f0ece4}

/* ─── CSS Variables ──────────────────────────────────────────── */
:root{
  --bg:#f5f0e8;--bg2:#ede7d9;--surface:#faf7f2;--border:#c8bfaa;
  --text:#1a1410;--text2:#3d3228;--muted:#8a7d6b;
  --accent:#1a5fa8;--acc-l:#e8f0fa;
  --green:#1a6b3a;--grn-bg:#e6f4ec;
  --red:#b02a1f;--red-bg:#fdecea;
  --gold:#c49a2a;
  --sh:0 2px 10px rgba(26,20,16,.10);
  --sh-lg:0 6px 28px rgba(26,20,16,.16);
}
body[data-dark="1"]{
  --bg:#111010;--bg2:#1c1a17;--surface:#1e1c18;--border:#3a352c;
  --text:#f0ece4;--text2:#c8bfaa;--muted:#7a6e60;--acc-l:#0d2040;
  --grn-bg:#0d2018;--red-bg:#1e0d0a;
}

/* ─── App shell ──────────────────────────────────────────────── */
.app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen-bill{background:#e8e0d0}

/* ─── Topbar ─────────────────────────────────────────────────── */
.topbar{background:var(--surface);border-bottom:2px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-home{background:var(--surface);border-bottom:2px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.back-btn{min-width:46px;height:46px;border-radius:10px;background:var(--bg2);border:2px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:700;flex-shrink:0}
.bar-info{flex:1}
.bar-title{font-weight:800;color:var(--text);font-size:1.05rem}
.bar-sub{color:var(--muted);font-size:.8rem;margin-top:1px}
.icon-btn{padding:9px 13px;border-radius:10px;background:var(--bg2);border:2px solid var(--border);color:var(--text);font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer;font-size:.82rem;white-space:nowrap}

/* ─── Home body ──────────────────────────────────────────────── */
.home-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:16px 20px 80px;gap:12px}
.logo-wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.logo-badge{display:inline-flex;align-items:center;gap:6px;background:var(--acc-l);border:2px solid var(--accent);border-radius:100px;padding:4px 13px;color:var(--accent);font-weight:700;font-size:.78rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.app-title{font-family:'Noto Serif Thai',serif;font-weight:900;font-size:2.4rem;letter-spacing:-.5px;line-height:1.1;color:var(--text)}
.app-sub{color:var(--muted);font-weight:600;font-size:.88rem}

/* ─── Mic ────────────────────────────────────────────────────── */
.mic-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:210px;height:210px;flex-shrink:0}
.mic-ring{position:absolute;border-radius:50%;border:2px solid rgba(26,95,168,.14);animation:breathe 3s ease-in-out infinite}
.mic-ring.r1{width:188px;height:188px}
.mic-ring.r2{width:208px;height:208px;animation-delay:.9s;opacity:.5}
.mic-ring.rec{border-color:rgba(26,95,168,.4);animation:ring-rec .7s ease-out infinite}
.mic-ring.r2.rec{animation-delay:.35s}
@keyframes breathe{0%,100%{transform:scale(.96);opacity:.2}50%{transform:scale(1.04);opacity:.6}}
@keyframes ring-rec{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.6);opacity:0}}
.mic-btn{width:160px;height:160px;border-radius:50%;background:var(--surface);border:3px solid var(--border);box-shadow:var(--sh-lg);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;user-select:none;position:relative;z-index:2;transition:all .12s}
.mic-btn.rec{background:var(--acc-l);border-color:var(--accent);box-shadow:0 0 0 10px rgba(26,95,168,.12),var(--sh-lg);transform:scale(.95)}
.mic-icon{font-size:46px;line-height:1}
.mic-lbl{font-weight:700;color:var(--text2);font-size:.86rem}
.mic-btn.rec .mic-lbl{color:var(--accent)}

/* ─── Transcript ─────────────────────────────────────────────── */
.tc-box{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:13px 15px;min-height:64px;box-shadow:var(--sh);position:relative;overflow:hidden}
.tc-tag{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.74rem;margin-bottom:5px}
.tc-text{color:var(--text);font-weight:600;line-height:1.6;font-size:.94rem}
.tc-text.muted{color:var(--muted);font-weight:400;font-style:italic}
.scan-line{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 1.6s linear infinite}
@keyframes scan{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* ─── Status ─────────────────────────────────────────────────── */
.status-pill{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:2px solid var(--border);border-radius:100px;padding:9px 16px;font-weight:700;color:var(--text2);box-shadow:var(--sh);font-size:.82rem}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
.sdot.live{background:var(--accent);animation:blink .7s infinite}
.status-row{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--muted);font-size:.88rem}
.spinner{width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── FAB ────────────────────────────────────────────────────── */
.fab{position:fixed;bottom:20px;right:14px;z-index:300;width:52px;height:52px;border-radius:14px;background:var(--accent);border:none;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(26,95,168,.4)}

/* ─── Confirm screen ─────────────────────────────────────────── */
.scroll-area{flex:1;overflow-y:auto;padding:8px 11px;display:flex;flex-direction:column;gap:7px}
.item-card{background:var(--surface);border:2px solid var(--border);border-radius:13px;padding:13px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh);flex-wrap:wrap;flex-shrink:0}
.item-idx{min-width:32px;height:32px;background:var(--bg2);border:2px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--muted);flex-shrink:0;font-size:.78rem}
.item-body{flex:1;min-width:0}
.item-name{font-weight:800;color:var(--text);word-break:break-word;font-size:1rem}
.item-sub{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--accent);white-space:nowrap;font-size:1rem}
.del-btn{min-width:38px;height:38px;border-radius:9px;background:var(--red-bg);border:2px solid rgba(176,42,31,.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;flex-shrink:0}
.edit-row{width:100%;display:flex;align-items:center;gap:6px;padding-top:8px;border-top:1.5px dashed var(--border);flex-wrap:nowrap}
.ie-lbl{font-size:.72rem;color:var(--muted);font-weight:700;white-space:nowrap;flex-shrink:0}
.ie-input{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:6px 8px;font-family:'Sarabun',sans-serif;font-weight:700;color:var(--text);font-size:.9rem;min-height:36px;text-align:right;width:68px;flex-shrink:0}
.ie-input:focus{border-color:var(--accent);outline:none}
.ie-input.wide{width:82px}
.ie-eq{font-size:.85rem;color:var(--muted);font-weight:700;flex-shrink:0}
.ie-sub{font-family:'IBM Plex Mono',monospace;font-weight:800;color:var(--accent);font-size:.94rem;white-space:nowrap;margin-left:auto;flex-shrink:0}

/* ─── More bar / Manual bar ──────────────────────────────────── */
.more-bar,.manual-bar{margin:0 11px 7px;background:var(--surface);border:2px solid var(--border);border-radius:13px;padding:11px 13px;box-shadow:var(--sh);flex-shrink:0}
.more-label{color:var(--muted);margin-bottom:7px;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:.74rem}
.more-row{display:flex;gap:8px;align-items:flex-start}
.mic-mini{min-width:48px;height:48px;border-radius:11px;background:var(--bg2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0}
.mic-mini.rec{background:var(--acc-l);border-color:var(--accent)}
.more-tc{flex:1;background:var(--bg2);border:2px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text2);min-height:48px;font-weight:600;line-height:1.5;font-size:.88rem}
.manual-row{display:flex;gap:5px}
.f{background:var(--bg2);border:2px solid var(--border);border-radius:9px;padding:9px 11px;font-family:'Sarabun',sans-serif;font-weight:600;color:var(--text);font-size:.9rem;min-height:44px}
.f:focus{border-color:var(--accent);outline:none}
.fn{flex:2;min-width:0}
.fq{width:56px;text-align:center}
.fp{width:84px;text-align:right}
.add-btn{min-width:44px;height:44px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* ─── Total + Actions ────────────────────────────────────────── */
.total-bar{margin:0 11px 7px;background:var(--text);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh-lg);flex-shrink:0}
.total-lbl{color:rgba(255,255,255,.55);font-weight:600;font-size:.9rem}
.total-cnt{color:rgba(255,255,255,.4);font-weight:600;font-size:.8rem;margin-top:2px}
.total-num{font-family:'IBM Plex Mono',monospace;font-weight:700;color:#fff;font-size:1.8rem}
.actions{padding:0 11px 22px;display:flex;gap:7px;flex-shrink:0}
.btn-sec{flex:1;padding:14px;border-radius:13px;background:var(--surface);border:2px solid var(--border);color:var(--text2);font-family:'Sarabun',sans-serif;font-weight:700;cursor:pointer;font-size:1rem}
.btn-pri{flex:2;padding:14px;border-radius:13px;background:var(--accent);border:none;color:#fff;font-family:'Sarabun',sans-serif;font-weight:800;cursor:pointer;font-size:1rem}
.btn-gear{width:48px;height:48px;border-radius:13px;background:var(--bg2);border:2px solid var(--border);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}

/* ─── Bill Screen ────────────────────────────────────────────── */
.bill-topbar{background:#1a3a6b;padding:11px 13px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.dark-btn{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#fff}
.bill-tb-title{font-weight:800;color:#fff;flex:1;font-size:1rem}
.locked-badge{display:flex;align-items:center;gap:4px;background:rgba(26,107,58,.35);border:1.5px solid rgba(96,220,140,.5);border-radius:100px;padding:4px 9px;color:#6efcb0;font-weight:700;font-size:.74rem}
.share-bar{background:#1a3a6b;padding:7px 12px 10px;display:flex;gap:8px;flex-shrink:0;border-bottom:2px solid rgba(255,255,255,.1)}
.share-btn{flex:1;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;padding:9px 6px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:700;font-size:.88rem}
.share-btn.main{background:rgba(196,154,42,.28);border-color:rgba(196,154,42,.6);flex:1.5}
.bill-scroll{flex:1;overflow-y:auto;padding:14px 11px 30px}

/* ─── Bill Paper ─────────────────────────────────────────────── */
.bill-paper{background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.22),0 1px 4px rgba(0,0,0,.12);max-width:380px;margin:0 auto;border:1px solid #d0c8b8;user-select:none}

/* Header */
.bp-head{background:#1a5fa8}
.bp-head-row{padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:flex-start}
.bp-label{font-size:8.5px;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.bp-val{font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:700;color:rgba(255,255,255,.88);margin-top:1px}
.bp-head-center{text-align:center;padding:4px 16px 10px;border-top:1px solid rgba(255,255,255,.14)}
.bp-th{font-family:'Noto Serif Thai',serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:1px}
.bp-en{font-size:9.5px;color:rgba(255,255,255,.62);letter-spacing:3px;text-transform:uppercase;margin-top:1px}

/* Shop row */
.bp-shop{background:#f0ebe0;padding:10px 16px;border-bottom:1.5px solid #d0c8b0}
.bp-shop-name{font-family:'Noto Serif Thai',serif;font-size:16px;font-weight:700;color:#1a1410}
.bp-shop-det{font-size:10px;color:#6a5e4a;margin-top:2px;line-height:1.5}
.bp-shop-tax{font-size:9px;color:#8a7a60;font-family:'IBM Plex Mono',monospace;margin-top:3px}

/* Meta */
.bp-meta{display:flex;background:#faf8f2;border-bottom:1.5px dashed #d0c8b0}
.bp-mc{flex:1;padding:9px 12px;border-right:1.5px dashed #d0c8b0}
.bp-mc:last-child{border-right:none}
.bp-ml{font-size:8px;color:#9a8e78;text-transform:uppercase;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace}
.bp-mv{font-size:11.5px;font-weight:800;color:#1a1410;margin-top:2px}

/* Column headers */
.bp-col-head{display:grid;grid-template-columns:1fr 90px 72px;background:#1a5fa8;padding:7px 16px;gap:4px}
.bp-ch{font-size:8.5px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.5px;text-transform:uppercase}
.bp-ch.r{text-align:right}

/* Items */
.bp-items{padding:0 16px}
.bp-item{display:grid;grid-template-columns:1fr 90px 72px;padding:9px 0;border-bottom:1px dashed #e0d8c8;align-items:start;gap:4px}
.bp-item:last-child{border-bottom:none}
.bp-iname{font-size:13px;font-weight:700;color:#1a1410}
.bp-iqty{font-size:10px;color:#7a6a52;margin-top:2px}
.bp-icol{font-size:12px;font-weight:600;color:#3d3228;text-align:right}
.bp-isub{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:#1a1410;text-align:right}

/* Total */
.bp-total{background:#f0ebe0;border-top:2px solid #1a5fa8;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.bp-tl{font-size:13px;color:#6a5e4a;font-weight:700}
.bp-tvat{font-size:9.5px;color:#9a8e78;margin-top:2px}
.bp-tv{font-family:'IBM Plex Mono',monospace;font-weight:900;color:#1a5fa8;font-size:22px}

/* QR section — Shopee-style split */
.bp-qr-section{display:flex;background:#faf8f2;border-top:1.5px dashed #d0c8b0}
.bp-qr-left{flex:1;padding:14px 16px;display:flex;flex-direction:column;align-items:center;gap:8px;border-right:1.5px dashed #d0c8b0}
.bp-qr-title{font-size:8.5px;color:#9a8e78;letter-spacing:1.5px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.bp-qr-box{padding:8px;background:#fff;border-radius:8px;border:1.5px solid #d0c8b0;display:flex;align-items:center;justify-content:center}
.bp-hash{font-family:'IBM Plex Mono',monospace;font-size:7px;color:#b8aa90;word-break:break-all;text-align:center;max-width:160px;line-height:1.5}
.bp-qr-right{width:100px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;gap:6px}
.bp-locked-box{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(26,95,168,.06);border:1.5px solid rgba(26,95,168,.18);border-radius:12px;padding:12px 8px;width:100%}
.bp-lock-icon{font-size:26px}
.bp-lock-title{font-size:10px;font-weight:800;color:#1a5fa8;text-align:center}
.bp-lock-sub{font-size:8.5px;color:#9a8e78;text-align:center}

/* Footer */
.bp-footer{padding:10px 16px 14px;text-align:center;background:#faf8f2;border-top:1.5px solid #e0d8c8}
.bp-fv{font-size:10px;color:#1a6b3a;font-weight:700;margin-bottom:2px}
.bp-ft{font-size:9px;color:#9a8e78}

/* ─── History ────────────────────────────────────────────────── */
.hcard{background:var(--surface);border:2px solid var(--border);border-radius:13px;padding:13px;box-shadow:var(--sh)}
.hcard-top{display:flex;justify-content:space-between;align-items:flex-start}
.hno{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--muted);font-size:.78rem}
.hdate{color:var(--muted);font-size:.78rem;margin-top:3px;font-weight:600}
.htotal{font-family:'IBM Plex Mono',monospace;font-weight:800;color:var(--accent);font-size:1.05rem}
.hitems{color:var(--text2);margin-top:7px;font-weight:600;font-size:.88rem;line-height:1.5}
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:50px;color:var(--muted);text-align:center;font-weight:600}

/* ─── Settings modal ─────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:flex-end;backdrop-filter:blur(3px)}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:88dvh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.modal-handle{width:44px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0}
.modal-head{padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--border);flex-shrink:0}
.modal-title{font-weight:800;flex:1;font-size:1.05rem}
.modal-close{width:42px;height:42px;border-radius:10px;background:var(--bg2);border:2px solid var(--border);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:14px 16px 32px;display:flex;flex-direction:column;gap:14px}
.cfg-section{display:flex;flex-direction:column;gap:8px}
.cfg-label{font-weight:700;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.76rem}
.shop-input{width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:9px;padding:11px;font-family:'Sarabun',sans-serif;font-weight:600;font-size:.94rem;color:var(--text)}
.shop-input:focus{border-color:var(--accent);outline:none}
.shop-input.mono{font-family:'IBM Plex Mono',monospace;font-size:.82rem}
.prov-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.prov-btn{padding:11px 9px;border-radius:11px;border:2px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:'Sarabun',sans-serif;transition:all .12s}
.prov-btn.selected{border-color:var(--accent);background:var(--acc-l);box-shadow:0 0 0 3px rgba(26,95,168,.14)}
.prov-name{font-weight:800;color:var(--text);font-size:13px}
.prov-tag{font-size:9.5px;color:var(--muted);font-weight:600}
.save-btn{width:100%;padding:15px;border-radius:13px;background:var(--accent);border:none;color:#fff;font-family:'Sarabun',sans-serif;font-weight:800;font-size:1rem;cursor:pointer}

/* ─── Toast ──────────────────────────────────────────────────── */
.toast-wrap{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:600;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.toast{background:var(--text);color:var(--bg);padding:9px 18px;border-radius:100px;font-weight:700;font-size:.82rem;box-shadow:var(--sh-lg);animation:toast-in .2s ease}

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<!-- Pure-JS QR encoder → window.drawQRCanvas(canvas, text, color) -->
<script>
(function(){
"use strict";
var PPT=[[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50],[6,30,54],[6,32,58],[6,34,62],[6,26,46,66],[6,26,48,70],[6,26,50,74],[6,30,54,78],[6,30,56,82],[6,30,58,86],[6,34,62,90]];
var G15=(1<<10)|(1<<8)|(1<<5)|(1<<4)|(1<<2)|(1<<1)|(1<<0);
var G18=(1<<12)|(1<<11)|(1<<10)|(1<<9)|(1<<8)|(1<<5)|(1<<2)|(1<<0);
var G15M=(1<<14)|(1<<12)|(1<<10)|(1<<4)|(1<<1);
function bchTI(d){var x=d<<10;while(bchD(x)-bchD(G15)>=0)x^=(G15<<(bchD(x)-bchD(G15)));return((d<<10)|x)^G15M;}
function bchTN(d){var x=d<<12;while(bchD(x)-bchD(G18)>=0)x^=(G18<<(bchD(x)-bchD(G18)));return(d<<12)|x;}
function bchD(d){var r=0;while(d){r++;d>>>=1;}return r;}
var EX=new Array(256),LG=new Array(256);
(function(){for(var i=0;i<8;i++)EX[i]=1<<i;for(var i=8;i<256;i++)EX[i]=EX[i-4]^EX[i-5]^EX[i-6]^EX[i-8];for(var i=0;i<255;i++)LG[EX[i]]=i;})();
function gx(n){while(n<0)n+=255;while(n>=256)n-=255;return EX[n];}
function gl(n){return LG[n];}
function Poly(n,s){var o=0;while(o<n.length&&n[o]==0)o++;this.n=new Array(n.length-o+s);for(var i=0;i<n.length-o;i++)this.n[i]=n[i+o];}
Poly.prototype={get:function(i){return this.n[i];},len:function(){return this.n.length;},
  mul:function(e){var n=new Array(this.len()+e.len()-1);for(var i=0;i<this.len();i++)for(var j=0;j<e.len();j++)n[i+j]^=gx(gl(this.get(i))+gl(e.get(j)));return new Poly(n,0);},
  mod:function(e){if(this.len()-e.len()<0)return this;var rt=gl(this.get(0))-gl(e.get(0));var n=this.n.slice();for(var i=0;i<e.len();i++)n[i]^=gx(gl(e.get(i))+rt);return new Poly(n,0).mod(e);}};
function getMask(p,r,c){switch(p){case 0:return(r+c)%2==0;case 1:return r%2==0;case 2:return c%3==0;case 3:return(r+c)%3==0;}}
function errP(ec){var a=new Poly([1],0);for(var i=0;i<ec;i++)a=a.mul(new Poly([1,gx(i)],0));return a;}
var RSBT=[
  [1,26,19],[1,26,16],[1,26,13],[1,26,9],
  [1,44,34],[1,44,28],[1,44,22],[1,44,16],
  [1,70,55],[1,70,44],[2,35,17],[2,35,13],
  [1,100,80],[2,50,32],[2,50,24],[4,25,9],
  [1,134,108],[2,67,43],[2,33,15,2,34,16],[2,33,11,2,34,12],
  [2,86,68],[4,43,27],[4,43,19],[4,43,15],
  [2,98,78],[4,49,31],[2,32,14,4,33,14],[4,39,13,1,40,13],
  [2,121,97],[2,60,38,2,61,39],[4,40,18,2,41,18],[4,40,14,2,41,14],
  [2,146,116],[3,58,36,2,59,37],[4,36,16,4,37,17],[4,36,12,4,37,13],
  [2,86,68,2,87,69],[4,69,43,1,70,44],[6,43,19,2,44,20],[6,43,15,2,44,16],
  [4,101,81],[1,80,50,4,81,51],[4,50,22,4,51,23],[3,36,12,8,37,13],
  [2,116,92,2,117,93],[6,58,36,2,59,37],[4,46,20,6,47,21],[7,42,14,4,43,15]
];
function rsBlocks(tn,ecl){var b=[],d=RSBT[(tn-1)*4+ecl];if(!d)throw new Error('v');for(var i=0;i<d.length;i+=3)for(var j=0;j<d[i];j++)b.push({data:d[i+2],ec:d[i+1]-d[i+2]});return b;}
function BitBuf(){this.buf=[];this.len=0;}
BitBuf.prototype={put:function(n,l){for(var i=0;i<l;i++)this.putBit(((n>>>(l-i-1))&1)==1);},putBit:function(b){var i=Math.floor(this.len/8);if(this.buf.length<=i)this.buf.push(0);if(b)this.buf[i]|=0x80>>>(this.len%8);this.len++;}};
function build(text,tn,ecl){
  var bytes=[];
  for(var i=0;i<text.length;i++){var cc=text.charCodeAt(i);if(cc<0x80)bytes.push(cc);else if(cc<0x800){bytes.push(0xC0|(cc>>6));bytes.push(0x80|(cc&0x3F));}else{bytes.push(0xE0|(cc>>12));bytes.push(0x80|((cc>>6)&0x3F));bytes.push(0x80|(cc&0x3F));}}
  var buf=new BitBuf();
  var lb=(tn<10)?8:16;
  buf.put(4,4);buf.put(bytes.length,lb);
  for(var i=0;i<bytes.length;i++)buf.put(bytes[i],8);
  var rsb=rsBlocks(tn,ecl),tdc=rsb.reduce(function(s,b){return s+b.data;},0);
  if(buf.len>tdc*8)throw new Error('overflow');
  buf.put(0,Math.min(4,tdc*8-buf.len));
  while(buf.len%8)buf.putBit(false);
  while(buf.len<tdc*8){buf.put(0xEC,8);if(buf.len<tdc*8)buf.put(0x11,8);}
  var dc=[],ec=[],off=0;
  for(var r=0;r<rsb.length;r++){var dcd=buf.buf.slice(off,off+rsb[r].data);off+=rsb[r].data;dc.push(dcd);var rp=errP(rsb[r].ec),raw=new Poly(dcd,rp.len()-1),mod=raw.mod(rp),ecd=new Array(rp.len()-1);for(var i=0;i<ecd.length;i++){var mi=i+mod.len()-ecd.length;ecd[i]=mi>=0?mod.get(mi):0;}ec.push(ecd);}
  var mD=Math.max.apply(null,dc.map(function(d){return d.length;})),mE=Math.max.apply(null,ec.map(function(d){return d.length;})),out=[];
  for(var i=0;i<mD;i++)for(var r=0;r<rsb.length;r++)if(i<dc[r].length)out.push(dc[r][i]);
  for(var i=0;i<mE;i++)for(var r=0;r<rsb.length;r++)if(i<ec[r].length)out.push(ec[r][i]);
  return out;
}
function autoVer(text,ecl){for(var tn=1;tn<=12;tn++){try{build(text,tn,ecl);return tn;}catch(e){}}throw new Error('too long');}
function matrix(tn,ecl,data){
  var mc=tn*4+17,M=[];
  for(var i=0;i<mc;i++){M[i]=new Array(mc);for(var j=0;j<mc;j++)M[i][j]=null;}
  function finder(r,c){for(var dr=-1;dr<=7;dr++){if(r+dr<0||mc<=r+dr)continue;for(var dc2=-1;dc2<=7;dc2++){if(c+dc2<0||mc<=c+dc2)continue;M[r+dr][c+dc2]=((0<=dr&&dr<=6&&(dc2==0||dc2==6))||(0<=dc2&&dc2<=6&&(dr==0||dr==6))||(2<=dr&&dr<=4&&2<=dc2&&dc2<=4));}}}
  finder(0,0);finder(mc-7,0);finder(0,mc-7);
  for(var i=8;i<mc-8;i++){if(M[i][6]==null)M[i][6]=(i%2==0);if(M[6][i]==null)M[6][i]=(i%2==0);}
  var pp=PPT[tn-1]||[];
  for(var pi=0;pi<pp.length;pi++)for(var pj=0;pj<pp.length;pj++){var pr=pp[pi],pc2=pp[pj];if(M[pr][pc2]!=null)continue;for(var dr=-2;dr<=2;dr++)for(var dc2=-2;dc2<=2;dc2++)M[pr+dr][pc2+dc2]=(dr==-2||dr==2||dc2==-2||dc2==2||(dr==0&&dc2==0));}
  if(tn>=7){var tn2=bchTN(tn);for(var i=0;i<18;i++){var bv=!!((tn2>>i)&1);M[Math.floor(i/3)][i%3+mc-11]=bv;M[i%3+mc-11][Math.floor(i/3)]=bv;}}
  var mp=2; // fixed mask — fast
  var bits=bchTI((0<<3)|mp); // ecl=M=0
  for(var i=0;i<15;i++){var bv=(bits>>i)&1;if(i<6)M[i][8]=!!bv;else if(i<8)M[i+1][8]=!!bv;else M[mc-15+i][8]=!!bv;}
  for(var i=0;i<15;i++){var bv=(bits>>i)&1;if(i<8)M[8][mc-i-1]=!!bv;else if(i<9)M[8][15-i]=!!bv;else M[8][15-i-1]=!!bv;}
  M[mc-8][8]=true;
  var inc=-1,row=mc-1,bi=7,by=0,col=mc-1;
  while(col>0){if(col==6)col--;
    while(true){for(var c=0;c<2;c++){if(M[row][col-c]==null){var dk=by<data.length&&((data[by]>>>bi)&1)==1;if(getMask(mp,row,col-c))dk=!dk;M[row][col-c]=dk;bi--;if(bi<0){by++;bi=7;}}}
      row+=inc;if(row<0||mc<=row){row-=inc;inc=-inc;break;}}}
  return {M,mc};
}

window.drawQRCanvas = function(canvas, text, dark) {
  if (!canvas || !text) return;
  dark = dark || '#1a3a6b';
  var ecl = 0; // M
  try {
    var tn   = autoVer(text, ecl);
    var data = build(text, tn, ecl);
    var qr   = matrix(tn, ecl, data);
    var mc   = qr.mc, M = qr.M;
    var size = canvas.width;
    var cell = Math.max(1, Math.floor(size / (mc + 8)));
    var qz   = cell * 4;
    var total = mc * cell + qz * 2;
    canvas.width  = total;
    canvas.height = total;
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, total, total);
    ctx.fillStyle = dark;
    for (var r = 0; r < mc; r++)
      for (var c = 0; c < mc; c++)
        if (M[r][c]) ctx.fillRect(c * cell + qz, r * cell + qz, cell, cell);
  } catch(e) { console.warn('QR:', e.message); }
};
})();
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => Number(n).toLocaleString('th-TH');
const pad = n => String(n).padStart(2,'0');
const hash = s => {
  let h = 0x811c9dc5;
  for (let i=0; i<s.length; i++){h^=s.charCodeAt(i);h=(h*0x01000193)>>>0;}
  return h.toString(16).toUpperCase().padStart(8,'0')+'-'+(s.length*31^0xdeadbeef).toString(16).toUpperCase().slice(-4);
};
const nonce = () => Math.random().toString(36).slice(2,10).toUpperCase();
const gLS = (k,d='') => {try{return localStorage.getItem(k)||d;}catch(e){return d;}};
const sLS = (k,v) => {try{localStorage.setItem(k,v);}catch(e){}};
const getHist = () => {try{return JSON.parse(localStorage.getItem('vb_hist')||'[]');}catch(e){return[];}};
const saveHist = b => {const h=getHist();h.unshift(b);if(h.length>200)h.pop();sLS('vb_hist',JSON.stringify(h));};

// ── Toast system ──────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg.length > 34 ? msg.slice(0,32)+'…' : msg;
  w.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { if(w.firstChild) w.removeChild(w.firstChild); }, 1800);
}

// ── QR Canvas component ───────────────────────────────────────────────────────
function QRCanvas({ text, size=150 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && text && window.drawQRCanvas) {
      window.drawQRCanvas(ref.current, text, '#1a3a6b');
    }
  }, [text]);
  return <canvas ref={ref} width={size} height={size}
    style={{width:size,height:size,display:'block',imageRendering:'pixelated',borderRadius:4}} />;
}

// ── AI call ───────────────────────────────────────────────────────────────────
async function callAI(text, cfg) {
  const prompt = `แยกรายการสินค้าจากข้อความ: "${text}"
ตอบ JSON เท่านั้น: {"items":[{"name":"ชื่อ","qty":จำนวน,"unitPrice":ราคาต่อชิ้น}]}
โหล=12 ถ้าไม่มีจำนวนใส่1 ถ้าไม่มีราคาใส่0`;
  try {
    if (!cfg.key) throw new Error('no-key');
    let raw = '';
    if (cfg.prov==='claude') {
      const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':cfg.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]})});
      const d=await r.json(); raw=(d.content||[]).map(c=>c.text||'').join('');
    } else if (cfg.prov==='gemini') {
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${cfg.key}`,
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const d=await r.json(); raw=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
    } else if (cfg.prov==='openai') {
      const r=await fetch('https://api.openai.com/v1/chat/completions',
        {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:400,messages:[{role:'user',content:prompt}]})});
      const d=await r.json(); raw=d.choices?.[0]?.message?.content||'';
    } else if (cfg.prov==='llama') {
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',
        {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
        body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:400,messages:[{role:'user',content:prompt}]})});
      const d=await r.json(); raw=d.choices?.[0]?.message?.content||'';
    }
    const m=raw.replace(/```json|```/g,'').match(/\{[\s\S]*\}/);
    if(!m) throw new Error('no json');
    const p=JSON.parse(m[0]);
    return (p.items||[]).map(i=>({name:i.name,qty:+i.qty||1,up:+i.unitPrice||0,sub:(+i.qty||1)*(+i.unitPrice||0)}));
  } catch(e) {
    if (e.message==='no-key') { showToast('⚠️ ใส่ API Key ในการตั้งค่าก่อน'); return []; }
    // fallback parse
    const out=[];
    const re=/([ก-์a-zA-Z][ก-์a-zA-Z\s]*?)\s+(\d+)\s*(?:ตัว|ชิ้น|อัน|ถุง|กล่อง|แพ็ค|โหล)?\s*(?:ตัวละ|ละ|ราคา|@|x)?\s*(\d+)/g;
    let m2;
    while((m2=re.exec(text))!==null){const n=m2[1].trim(),q=+m2[2],u=+m2[3];if(n&&q>0)out.push({name:n,qty:q,up:u,sub:q*u});}
    return out;
  }
}

// ═════════════════════════════════════════════════════════════════════════════
// HOME
// ═════════════════════════════════════════════════════════════════════════════
function HomeScreen({ cfg, dark, setDark, setItems, setScreen, onSettings }) {
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [processing, setProcessing] = useState(false);
  const recRef = useRef(null);

  const startRec = e => {
    e.preventDefault();
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('ใช้ Chrome หรือ Safari');return;}
    const r=new SR();r.lang='th-TH';r.continuous=true;r.interimResults=true;
    let fin='';
    r.onresult=ev=>{let tmp='';for(let i=ev.resultIndex;i<ev.results.length;i++){if(ev.results[i].isFinal)fin+=ev.results[i][0].transcript+' ';else tmp+=ev.results[i][0].transcript;}setTranscript(fin+tmp);};
    r.onend=()=>{if(recRef.current===r)try{r.start();}catch(e){}};
    r.onerror=ev=>{if(ev.error!=='no-speech')showToast('ไมโครโฟน: '+ev.error);};
    recRef.current=r;r.start();
    setListening(true);setTranscript('');
  };

  const stopRec = async e => {
    e.preventDefault();
    if(!recRef.current)return;
    const text=transcript.trim();
    recRef.current.onend=null;recRef.current.stop();recRef.current=null;
    setListening(false);
    if(!text)return;
    setProcessing(true);
    const parsed=await callAI(text,cfg);
    setProcessing(false);
    if(parsed.length){setItems(parsed);setScreen('confirm');}
    else showToast('วิเคราะห์ไม่ได้ ลองพูดใหม่');
  };

  return (
    <div className="screen">
      <div className="topbar-home">
        <button className="icon-btn" onClick={()=>setDark(d=>!d)}>{dark?'☀️ ในร่ม':'🌙 กลางแจ้ง'}</button>
        <button className="icon-btn" onClick={()=>setScreen('history')}>📋 ประวัติ</button>
      </div>

      <div className="home-body">
        {/* Logo */}
        <div className="logo-wrap">
          <AppLogo size={76} />
          <div className="logo-badge"><span className="dot"/>ระบบบิลดิจิทัล AI</div>
          <h1 className="app-title">บิลเสียง</h1>
          <p className="app-sub">พูดสินค้า · จำนวน · ราคา → บิลทันที</p>
        </div>

        {/* Mic */}
        <div className="mic-wrap">
          <div className={`mic-ring r1${listening?' rec':''}`}/>
          <div className={`mic-ring r2${listening?' rec':''}`}/>
          <button className={`mic-btn${listening?' rec':''}`}
            onMouseDown={startRec} onMouseUp={stopRec}
            onTouchStart={startRec} onTouchEnd={stopRec}>
            <span className="mic-icon">🎙️</span>
            <span className="mic-lbl">{listening?'กำลังฟัง...':'กดค้างแล้วพูด'}</span>
          </button>
        </div>

        {/* Transcript */}
        <div className="tc-box">
          <div className="tc-tag">📝 ข้อความที่รับได้</div>
          {transcript
            ? <div className="tc-text">{transcript}</div>
            : <div className="tc-text muted">เช่น "เสื้อยืด 12 ตัว ตัวละ 150 กางเกง 6 ตัว ตัวละ 200"</div>}
          {listening && <div className="scan-line"/>}
        </div>

        {/* Status */}
        {processing
          ? <div className="status-row"><div className="spinner"/><span>AI กำลังวิเคราะห์...</span></div>
          : <div className="status-pill"><div className={`sdot${listening?' live':''}`}/><span>พร้อมรับคำสั่งเสียง</span></div>}
      </div>

      <button className="fab" onClick={onSettings}>⚙️</button>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// CONFIRM
// ═════════════════════════════════════════════════════════════════════════════
function ConfirmScreen({ items, setItems, cfg, onConfirm, onBack, onSettings }) {
  const [moreText, setMoreText] = useState('กดค้างแล้วพูดเพิ่มรายการ...');
  const [moreRec,  setMoreRec]  = useState(false);
  const [name, setName]   = useState('');
  const [qty,  setQty]    = useState('1');
  const [price,setPrice]  = useState('');
  const recRef = useRef(null);

  const total = items.reduce((s,i)=>s+i.sub,0);

  const edit = (i,field,val) => {
    setItems(prev => {
      const n=[...prev];
      n[i]={...n[i],[field]:+val||0};
      n[i].sub=n[i].qty*n[i].up;
      return n;
    });
  };

  const startMore = e => {
    e.preventDefault();
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return;
    const r=new SR();r.lang='th-TH';r.continuous=true;r.interimResults=true;
    let fin='';
    r.onresult=ev=>{let tmp='';for(let i=ev.resultIndex;i<ev.results.length;i++){if(ev.results[i].isFinal)fin+=ev.results[i][0].transcript+' ';else tmp+=ev.results[i][0].transcript;}setMoreText(fin+tmp||'กำลังฟัง...');};
    r.onend=()=>{if(recRef.current===r)try{r.start();}catch(e){}};
    recRef.current=r;r.start();setMoreRec(true);setMoreText('กำลังฟัง...');
  };

  const stopMore = async e => {
    e.preventDefault();
    if(!recRef.current)return;
    const text=moreText.trim();
    recRef.current.onend=null;recRef.current.stop();recRef.current=null;setMoreRec(false);
    if(!text||text==='กำลังฟัง...'){setMoreText('กดค้างแล้วพูดเพิ่มรายการ...');return;}
    setMoreText('AI กำลังวิเคราะห์...');
    const parsed=await callAI(text,cfg);
    if(parsed.length){setItems(prev=>[...prev,...parsed]);showToast(`✅ เพิ่ม ${parsed.length} รายการแล้ว`);}
    setMoreText('กดค้างแล้วพูดเพิ่มรายการ...');
  };

  const addManual = () => {
    if(!name.trim())return;
    const q=parseInt(qty)||1,p=parseFloat(price)||0;
    setItems(prev=>[...prev,{name:name.trim(),qty:q,up:p,sub:q*p}]);
    setName('');setQty('1');setPrice('');
    showToast(`➕ เพิ่ม "${name.trim()}" แล้ว`);
  };

  return (
    <div className="screen">
      <div className="topbar">
        <button className="back-btn" onClick={onBack}>←</button>
        <div className="bar-info">
          <div className="bar-title">ตรวจสอบรายการ</div>
          <div className="bar-sub">{items.length} รายการ</div>
        </div>
      </div>

      <div className="scroll-area">
        {items.map((item,i)=>(
          <div key={i} className="item-card">
            <div className="item-idx">{i+1}</div>
            <div className="item-body"><div className="item-name">{item.name}</div></div>
            <div className="item-sub">{fmt(item.sub)} ฿</div>
            <button className="del-btn" onClick={()=>setItems(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
            <div className="edit-row">
              <span className="ie-lbl">จำนวน</span>
              <input className="ie-input" type="number" inputMode="numeric" min="1" max="9999"
                defaultValue={item.qty} onChange={e=>edit(i,'qty',e.target.value)}/>
              <span className="ie-eq">×</span>
              <span className="ie-lbl">ราคา/ชิ้น</span>
              <input className="ie-input wide" type="number" inputMode="decimal" min="0"
                defaultValue={item.up} onChange={e=>edit(i,'up',e.target.value)}/>
              <span className="ie-eq">=</span>
              <span className="ie-sub">{fmt(item.sub)} ฿</span>
            </div>
          </div>
        ))}
      </div>

      <div className="more-bar">
        <div className="more-label">🎙 พูดเพิ่ม / แก้ไขรายการ</div>
        <div className="more-row">
          <button className={`mic-mini${moreRec?' rec':''}`}
            onMouseDown={startMore} onMouseUp={stopMore}
            onTouchStart={startMore} onTouchEnd={stopMore}>🎙️</button>
          <div className="more-tc">{moreText}</div>
        </div>
      </div>

      <div className="manual-bar">
        <div className="more-label">✏️ เพิ่มรายการด้วยมือ</div>
        <div className="manual-row">
          <input className="f fn" placeholder="ชื่อสินค้า" value={name} onChange={e=>setName(e.target.value)}/>
          <input className="f fq" type="number" placeholder="จำนวน" value={qty} onChange={e=>setQty(e.target.value)}/>
          <input className="f fp" type="number" placeholder="ราคา/ชิ้น" value={price} onChange={e=>setPrice(e.target.value)}/>
          <button className="add-btn" onClick={addManual}>+</button>
        </div>
      </div>

      <div className="total-bar">
        <div>
          <div className="total-lbl">ยอดรวม</div>
          <div className="total-cnt">{items.length} รายการ</div>
        </div>
        <div className="total-num">{fmt(total)} ฿</div>
      </div>

      <div className="actions">
        <button className="btn-sec" onClick={onBack}>← กลับ</button>
        <button className="btn-pri" onClick={onConfirm}>✅ ออกบิล</button>
        <button className="btn-gear" onClick={onSettings}>⚙️</button>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// BILL  ← QR ทำงานได้แน่นอน — สร้างทันทีไม่มี async
// ═════════════════════════════════════════════════════════════════════════════
function BillScreen({ bill, onBack }) {
  if (!bill) return null;
  const { no, date, shop, shopDetail, items, total, billHash } = bill;
  const d = new Date(date);
  const dateStr = d.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  const timeStr = d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  const qrText  = `VB1|${no}|${shop}|${total}|${billHash}`;

  const sharePNG = async () => {
    const el = document.getElementById('bill-paper');
    if (!el||!window.html2canvas){showToast('กำลังโหลด...');return;}
    showToast('📲 กำลังสร้างภาพ...');
    const canvas = await window.html2canvas(el,{scale:2.5,backgroundColor:'#fff',useCORS:true,logging:false});
    const dataUrl = canvas.toDataURL('image/png');
    if (navigator.canShare){
      const res=await fetch(dataUrl),blob=await res.blob();
      const file=new File([blob],`bill-${no}.png`,{type:'image/png'});
      if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'บิล '+no});return;}
    }
    const a=document.createElement('a');a.href=dataUrl;a.download=`bill-${no}.png`;a.click();
    showToast('⬇️ บันทึกภาพแล้ว');
  };

  const shareText = () => {
    const lines=[`🧾 บิลเงินสด · ${no}`,`🏪 ${shop}`,'─────────────',
      ...items.map(i=>`• ${i.name} ×${i.qty} = ${fmt(i.sub)} ฿`),'─────────────',
      `💰 รวม ${fmt(total)} ฿`,`🔒 ${billHash}`].join('\n');
    if(navigator.share)navigator.share({title:'บิล '+no,text:lines});
    else navigator.clipboard?.writeText(lines).then(()=>showToast('คัดลอกแล้ว'));
  };

  return (
    <div className="screen screen-bill">
      <div className="bill-topbar">
        <button className="back-btn dark-btn" onClick={onBack}>←</button>
        <div className="bill-tb-title">บิลเงินสดดิจิทัล</div>
        <div className="locked-badge">🔒 ล็อค</div>
      </div>

      <div className="share-bar">
        <button className="share-btn main" onClick={sharePNG}>📲 ส่งให้ลูกค้า</button>
        <button className="share-btn" onClick={shareText}>💬 ข้อความ</button>
      </div>

      <div className="bill-scroll">
        <div id="bill-paper" className="bill-paper">

          <div className="bp-head">
            <div className="bp-head-row">
              <div><div className="bp-label">DIGITAL BILL</div><div className="bp-val">บิลเงินสด · CASH SALE</div></div>
              <div style={{textAlign:'right'}}><div className="bp-label">เลขที่ · BILL NO.</div><div className="bp-val">{no}</div></div>
            </div>
            <div className="bp-head-center">
              <div className="bp-th">บิลเงินสด</div>
              <div className="bp-en">CASH SALE · 现金收据</div>
            </div>
          </div>

          <div className="bp-shop">
            <div className="bp-shop-name">{shop}</div>
            {shopDetail && <div className="bp-shop-det">{shopDetail}</div>}
          </div>

          <div className="bp-meta">
            <div className="bp-mc"><div className="bp-ml">วันที่</div><div className="bp-mv">{dateStr}</div></div>
            <div className="bp-mc"><div className="bp-ml">เวลา</div><div className="bp-mv">{timeStr}</div></div>
            <div className="bp-mc"><div className="bp-ml">รายการ</div><div className="bp-mv">{items.length} รายการ</div></div>
          </div>

          <div className="bp-col-head">
            <div className="bp-ch">รายการสินค้า</div>
            <div className="bp-ch r">จำนวน × ราคา</div>
            <div className="bp-ch r">รวม</div>
          </div>

          <div className="bp-items">
            {items.map((it,i)=>(
              <div key={i} className="bp-item">
                <div><div className="bp-iname">{it.name}</div><div className="bp-iqty">{it.qty} ชิ้น</div></div>
                <div className="bp-icol">{it.qty} × {fmt(it.up)}</div>
                <div className="bp-isub">{fmt(it.sub)} ฿</div>
              </div>
            ))}
          </div>

          <div className="bp-total">
            <div><div className="bp-tl">รวมทั้งสิ้น / TOTAL</div><div className="bp-tvat">ราคารวมภาษีมูลค่าเพิ่ม (ถ้ามี)</div></div>
            <div className="bp-tv">{fmt(total)} ฿</div>
          </div>

          {/* QR section — Shopee-style */}
          <div className="bp-qr-section">
            <div className="bp-qr-left">
              <div className="bp-qr-title">สแกนตรวจสอบบิล</div>
              <div className="bp-qr-box">
                <QRCanvas text={qrText} size={150} />
              </div>
              <div className="bp-hash">Sig: {billHash}</div>
            </div>
            <div className="bp-qr-right">
              <div className="bp-locked-box">
                <div className="bp-lock-icon">🔒</div>
                <div className="bp-lock-title">ล็อคแล้ว</div>
                <div className="bp-lock-sub">แก้ไขไม่ได้</div>
              </div>
            </div>
          </div>

          <div className="bp-footer">
            <div className="bp-fv">✅ บิลลงลายมือชื่อดิจิทัลแล้ว · ไม่สามารถแก้ไขได้</div>
            <div className="bp-ft">ออกโดยระบบบิลเสียง AI · ใช้เป็นหลักฐานค่าใช้จ่ายตามจริงได้</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// HISTORY
// ═════════════════════════════════════════════════════════════════════════════
function HistoryScreen({ onBack }) {
  const hist = getHist();
  return (
    <div className="screen">
      <div className="topbar">
        <button className="back-btn" onClick={onBack}>←</button>
        <div className="bar-info">
          <div className="bar-title">ประวัติบิล</div>
          <div className="bar-sub">{hist.length} ใบ</div>
        </div>
      </div>
      <div className="scroll-area">
        {!hist.length && <div className="empty"><div style={{fontSize:40}}>🧾</div><div>ยังไม่มีบิล</div></div>}
        {hist.map((b,i)=>{
          const d=new Date(b.date);
          return (
            <div key={i} className="hcard">
              <div className="hcard-top">
                <div>
                  <div className="hno">{b.no}</div>
                  <div className="hdate">{d.toLocaleDateString('th-TH',{month:'long',day:'numeric'})} · {d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}</div>

                <div className="htotal">{fmt(b.total)} ฿</div>

            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ═════════════════════════════════════════════════════════════════════════════
const PROVS={claude:{name:'Claude',tag:'Anthropic · แนะนำ',ph:'sk-ant-api03-...'},gemini:{name:'Gemini',tag:'Google · ฟรีมาก',ph:'AIzaSy...'},openai:{name:'ChatGPT',tag:'OpenAI',ph:'sk-proj-...'},llama:{name:'Groq',tag:'Meta · เร็วมาก',ph:'gsk_...'}};

function SettingsModal({ cfg, setCfg, onClose }) {
  const [loc,setLoc]=useState({...cfg});
  const set=(k,v)=>setLoc(p=>({...p,[k]:v}));
  const save=()=>{setCfg(loc);onClose();showToast('💾 บันทึกแล้ว');};
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-head">
          <span style={{fontSize:20}}>⚙️</span>
          <div className="modal-title">ตั้งค่าระบบ</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="cfg-section">
            <div className="cfg-label">🏪 ข้อมูลร้าน</div>
            {[['shop','ชื่อร้าน *'],['owner','เจ้าของ'],['addr','ที่อยู่'],['addr2','จังหวัด'],['phone','โทรศัพท์'],['tax','เลขผู้เสียภาษี']].map(([k,ph])=>(
              <input key={k} className="shop-input" placeholder={ph} value={loc[k]||''} onChange={e=>set(k,e.target.value)}/>
            ))}
          </div>
          <div className="cfg-section">
            <div className="cfg-label">🤖 AI Provider</div>
            <div className="prov-grid">
              {Object.entries(PROVS).map(([id,p])=>(
                <button key={id} className={`prov-btn${loc.prov===id?' selected':''}`} onClick={()=>set('prov',id)}>
                  <div className="prov-name">{p.name}</div>
                  <div className="prov-tag">{p.tag}</div>
                </button>
              ))}
            </div>
          </div>
          <div className="cfg-section">
            <div className="cfg-label">🔑 API Key</div>
            <input className="shop-input mono" type="password" placeholder={PROVS[loc.prov]?.ph||'API Key'} value={loc.key||''} onChange={e=>set('key',e.target.value)}/>
          </div>
          <button className="save-btn" onClick={save}>💾 บันทึก</button>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen]         = useState('home');
  const [items,  setItems]          = useState([]);
  const [bill,   setBill]           = useState(null);
  const [dark,   setDark]           = useState(()=>gLS('vb_dark')==='1');
  const [settingsOpen, setSettings] = useState(false);
  const [cfg, setCfg] = useState(()=>({
    shop:  gLS('vb_shop','ร้านค้า'), owner: gLS('vb_owner'),
    addr:  gLS('vb_addr'),           addr2: gLS('vb_addr2'),
    phone: gLS('vb_phone'),          tax:   gLS('vb_tax'),
    key:   gLS('vb_key'),            prov:  gLS('vb_prov','claude'),
  }));

  useEffect(()=>{
    Object.entries({vb_shop:cfg.shop,vb_owner:cfg.owner,vb_addr:cfg.addr,vb_addr2:cfg.addr2,
      vb_phone:cfg.phone,vb_tax:cfg.tax,vb_key:cfg.key,vb_prov:cfg.prov}).forEach(([k,v])=>sLS(k,v));
  },[cfg]);

  useEffect(()=>{ sLS('vb_dark',dark?'1':'0'); document.body.dataset.dark=dark?'1':'0'; },[dark]);

  const confirmBill = () => {
    if(!items.length)return;
    const now=new Date();
    const no='BL'+now.getFullYear().toString().slice(-2)+pad(now.getMonth()+1)+pad(now.getDate())+'-'+(Math.floor(Math.random()*9000)+1000);
    const nc=nonce();
    const total=items.reduce((s,i)=>s+i.sub,0);
    const bh=hash(no+'|'+now.toISOString().slice(0,16)+'|'+items.map(i=>i.name+i.qty+i.up).join('|')+'|'+total+'|'+nc);
    const shopDetail=[cfg.owner,cfg.addr,cfg.addr2,cfg.phone?'📞 '+cfg.phone:''].filter(Boolean).join(' · ');
    const b={no,nonce:nc,date:now.toISOString(),shop:cfg.shop||'ร้านค้า',shopDetail,items:[...items],total,billHash:bh};
    saveHist(b);
    setBill(b);
    setScreen('bill');
  };

  return (
    <div className={`app${dark?' dark':''}`}>
      {screen==='home'    && <HomeScreen    cfg={cfg} dark={dark} setDark={setDark} setItems={setItems} setScreen={setScreen} onSettings={()=>setSettings(true)}/>}
      {screen==='confirm' && <ConfirmScreen items={items} setItems={setItems} cfg={cfg} onConfirm={confirmBill} onBack={()=>setScreen('home')} onSettings={()=>setSettings(true)}/>}
      {screen==='bill'    && <BillScreen    bill={bill} onBack={()=>setScreen('confirm')}/>}
      {screen==='history' && <HistoryScreen onBack={()=>setScreen('home')}/>}
      {settingsOpen       && <SettingsModal cfg={cfg} setCfg={setCfg} onClose={()=>setSettings(false)}/>}
      <div id="toast-wrap" className="toast-wrap"/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
